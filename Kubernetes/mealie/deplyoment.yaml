apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mealie
  name: mealie
  namespace: mealie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mealie
  template:
    metadata:
      labels:
        app: mealie
    spec:
      containers:
        - image: ghcr.io/mealie-recipes/mealie:v3.9.1
          name: mealie
          persistentVolumeClaims:
            - containerPort: 9000
          volumeMounts:
            - mountPath: /app/data
              name: mealie-pvc
      volumes:
        - name: mealie-pvc
          persistentVolumeClaim:
            claimName: mealie-pvc
